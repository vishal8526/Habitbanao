name: habit_forge
description: "HabitForge - Build Better Habits"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.7.0
  flutter: ^3.29.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  uuid: ^4.5.1
  intl: ^0.20.2
  fl_chart: ^0.70.2
  confetti: ^0.8.0
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  flutter_timezone: ^3.0.1
  permission_handler: ^11.3.1
  wakelock_plus: ^1.2.10
  flutter_slidable: ^3.1.1
  collection: ^1.19.1
  google_fonts: ^6.0.0
  shared_preferences: ^2.5.0
  table_calendar: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: "^0.13.0"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#370078"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  remove_alpha_ios: true


flutter:
  uses-material-design: true
